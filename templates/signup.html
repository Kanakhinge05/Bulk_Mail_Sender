<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Smart Mail Sender — Sign Up</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body { background: linear-gradient(135deg, #12b886 0%, #4fce9b 100%); min-height: 100vh; }
    .auth-card { max-width: 420px; margin: 72px auto; background: rgba(255,255,255,.96); border: 1px solid rgba(255,255,255,.7); box-shadow: 0 20px 60px rgba(0,0,0,.12); }
    .auth-header { font-weight: 700; letter-spacing: .03em; }
    .auth-subtitle { color: #657786; }
    .btn-brand { background: #12b886; border: none; }
    .btn-brand:hover { background: #0f9e72; }
    .auth-footer { font-size: .9rem; color: #6b7280; }
    .fade-in-up { animation: fadeInUp .9s ease both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="auth-card rounded-lg shadow-sm p-4 fade-in-up">
    <div class="text-center mb-4">
      <h2 class="auth-header">Create your account</h2>
      <p class="auth-subtitle">Sign up with your email to begin sending campaigns.</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('signup') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn btn-brand btn-block">Sign up</button>
    </form>

    <div class="text-center mt-3 auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </div>
  </div>
</body>
</html>
